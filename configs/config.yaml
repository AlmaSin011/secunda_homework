http:
  port: "8080"

log:
  level: "info"

mysql:
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"
  conn_max_idle_time: "2m"

redis:
  db: 0
  pool_size: 10
  dial_timeout: "2s"
  read_timeout: "500ms"
  write_timeout: "500ms"
  tasks_cache_ttl: "5m"

jwt:
  secret: ""
  ttl: "24h"
  issuer: "taskmgr"

ratelimit:
  rps: 1.67
  burst: 100

metrics:
  path: "/metrics"
